instances:
  openclaw:
    image: images:debian/14
    shared_folder: false
    provision:
      - |
        #!/bin/bash
        apt update
        apt -y full-upgrade --autoremove --purge
        apt -y install vim screen git curl rsync sudo
        apt -y install gnome-desktop
        adduser --uid=1000 --gid=1000 --disabled-password --gecos "" user
        adduser user sudo
        mkdir -p /home/user/.ssh/
        chown user:user /home/user/.ssh/
      - ssh: true
      - copy:
          source: /home/pawalls/.ssh/id_rsa.pub
          target: /home/openclaw/.ssh/authorized_keys
          mode: "0644"
          uid: 1000
          gid: 1000
      - copy:
          source: /etc/screenrc
          target: /etc/screenrc
          mode: "0644"
          uid: 0
          gid: 0
